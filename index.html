<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Giraffa Runner FIX</title>

<style>
body{margin:0;overflow:hidden;background:#87CEEB;font-family:Courier}
canvas{display:block}

#ui{
position:absolute;top:10px;left:10px;
color:white;font-size:18px;
text-shadow:2px 2px black;
z-index:5;
}

#start{
position:absolute;inset:0;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
background:rgba(0,0,0,0.85);
color:white;
z-index:10;
}

button{padding:15px 25px;font-size:18px;margin:5px}

#controls{
position:absolute;
bottom:15px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 15px;
}

.btn{
width:80px;height:80px;
font-size:28px;
background:#222;
color:white;
border-radius:15px;
touch-action:none;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">TIME: <span id="t">120</span></div>

<div id="start">
<h1>🦒 GIRAFFA RUNNER</h1>
<button onclick="startGame()">START</button>
<p>⬆ salta | ⬇ abbassati | evita i rami</p>
</div>

<div id="controls">
<div>
<button class="btn" id="left">⬅</button>
<button class="btn" id="right">➡</button>
</div>
<div>
<button class="btn" id="down">⬇</button>
<button class="btn" id="jump">⬆</button>
</div>
</div>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=800;c.height=400;

let keys={};

let world={
scroll:0,time:120,started:false,gameOver:false
};

let g={
x:200,y:280,w:45,h:60,
vy:0,on:false,crouch:false
};

let obstacles=[];
let platforms=[];

// 🔊 SUONO
let audioCtx;
function beep(f,d){
if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
let o=audioCtx.createOscillator();
let g2=audioCtx.createGain();
o.frequency.value=f;
g2.gain.value=0.2;
o.connect(g2);
g2.connect(audioCtx.destination);
o.start();
o.stop(audioCtx.currentTime+d);
}

function jumpSound(){beep(600,0.1)}
function hitSound(){beep(120,0.3)}

// MAPPA
function generate(){

platforms=[];
obstacles=[];

platforms.push({x:0,y:340,w:3000,h:60});

for(let i=0;i<25;i++){

let x=i*120;

// rocce (salto)
obstacles.push({
x:x+60,y:300,w:40,h:40,type:"rock"
});

// rami (abbassarsi)
if(Math.random()<0.5){
obstacles.push({
x:x+10,y:250,w:90,h:15,type:"branch"
});
}

}

}

function drawRect(x,y,w,h,c){
ctx.fillStyle=c;
ctx.fillRect(x,y,w,h);
}

// 🦒 GIRAFFA
function drawG(){
let sx=g.x-world.scroll;

drawRect(sx,g.y,g.w,g.h,"#FFD54F");
drawRect(sx+15,g.y-40,10,40,"#FFD54F");
drawRect(sx+10,g.y-55,25,15,"#FFD54F");
drawRect(sx+18,g.y-52,4,4,"black");
}

function startGame(){
document.getElementById("start").style.display="none";
world.started=true;
generate();
loop();
}

function update(){

if(!world.started) return;

world.time-=1/60;
if(world.time<=0) hitSound();

if(keys.left) g.x-=3;
if(keys.right) g.x+=4;

// salto
if(keys.jump && g.on){
g.vy=-12;
g.on=false;
jumpSound();
}

// ABBASSATI
g.crouch=keys.down && g.on;

g.vy+=0.6;
g.y+=g.vy;

let gh=g.crouch?35:60;

g.on=false;

// piattaforme
for(let p of platforms){

if(
g.x<p.x+p.w &&
g.x+g.w>p.x &&
g.y+gh>=p.y &&
g.y+gh<=p.y+20 &&
g.vy>=0
){
g.y=p.y-gh;
g.vy=0;
g.on=true;
}

}

// camera
world.scroll=g.x-200;
if(world.scroll<0) world.scroll=0;

// collisioni
for(let o of obstacles){

let hit=
g.x<o.x+o.w &&
g.x+g.w>o.x &&
g.y<o.y+o.h &&
g.y+gh>o.y;

if(hit){

// ramo → devi essere abbassato
if(o.type==="branch" && !g.crouch){
world.gameOver=true;
hitSound();
}

// roccia → sempre morte
if(o.type==="rock"){
world.gameOver=true;
hitSound();
}

}

}

if(g.y>500) world.gameOver=true;

}

function draw(){

ctx.clearRect(0,0,800,400);

drawRect(0,0,800,400,"#87CEEB");
drawRect(0,340,800,60,"#8B4513");

// terreno
for(let p of platforms){
drawRect(p.x-world.scroll,p.y,p.w,p.h,"#228B22");
}

// ostacoli
for(let o of obstacles){
let x=o.x-world.scroll;
drawRect(x,o.y,o.w,o.h,o.type==="rock"?"gray":"brown");
}

// giraffa
drawG();

document.getElementById("t").innerText=Math.floor(world.time);

// game over
if(world.gameOver){
ctx.fillStyle="rgba(0,0,0,0.7)";
ctx.fillRect(0,0,800,400);

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("GAME OVER",250,200);
}

}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

/* 🔥 SOLO TOUCH CONTROLS */

function bind(id,key){
document.getElementById(id).addEventListener("touchstart",()=>keys[key]=true);
document.getElementById(id).addEventListener("touchend",()=>keys[key]=false);
}

bind("left","left");
bind("right","right");
bind("jump","jump");
bind("down","down");

</script>

</body>
</html>
